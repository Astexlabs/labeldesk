name: publish

# only runs when a version tag is pushed to main — the secure way.
# no accidental publishes from commit messages; tags are deliberate.
#
# release flow:
#   1. bump version in pyproject.toml
#   2. git commit -m "release: v0.3.0"
#   3. git tag v0.3.0
#   4. git push origin main --tags
#
# pypi trusted publishing (oidc) — no api token stored in secrets.
# configure at: https://pypi.org/manage/project/labeldesk/settings/publishing/

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      on_main: ${{ steps.check.outputs.on_main }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: verify tag is on main
        id: check
        run: |
          if git branch -r --contains ${{ github.ref }} | grep -q 'origin/main'; then
            echo "on_main=true" >> $GITHUB_OUTPUT
          else
            echo "on_main=false" >> $GITHUB_OUTPUT
            echo "::error::tag ${{ github.ref }} is not on main branch"
          fi

  test:
    needs: verify
    if: needs.verify.outputs.on_main == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.13
      - run: uv sync --extra dev
      - run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      - run: uv run pytest tests/ -v

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.13

      - name: verify tag matches pyproject version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PYVER=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG" != "$PYVER" ]; then
            echo "::error::tag v$TAG != pyproject version $PYVER"
            exit 1
          fi

      - name: build
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: publish to pypi
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
